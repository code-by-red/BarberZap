<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Light blue-grey circle with dark blue outline -->
  <circle cx="16" cy="16" r="14" fill="#d1d5db" stroke="#1e3a5f" stroke-width="2"/>
  
  <!-- BZ letters in serif style -->
  <g fill="#1e3a5f" font-family="Georgia, serif" font-weight="bold">
    <!-- B letter (larger, more prominent) -->
    <text x="9" y="22" font-size="16">B</text>
    <!-- Z letter (smaller, slightly rotated, positioned upper right) -->
    <text x="18" y="16" font-size="11" transform="rotate(-15 22 12)">Z</text>
  </g>
</svg>
